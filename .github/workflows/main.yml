name: Minha-primeira-pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: gerar artefato ZIP
        run: zip -r pipeline-demo.zip .

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: codigo-buildado
          path: pipeline-demo.zip

  test:
    runs-on: ubuntu-latest
    needs: build 
    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v3
        with: 
          name: codigo-buildado

      - name: Extrair artefato
        run: unzip pipeline-demo.zip

      - name: Testar código
        run: pytest

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production
    steps:
      - name: Realizar deploy
        run: echo "Deploy bem sucedido"
